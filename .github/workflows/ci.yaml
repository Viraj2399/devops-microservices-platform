name: DevOps Microservices CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  NODE_VERSION: 20

jobs:
# --------------------------------------------------
# 1️⃣ COMPILE / BUILD CHECK
# --------------------------------------------------
  compile:
    name: Compile & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Frontend build
      - name: Build Frontend
        run: |
          cd app/frontend
          npm install
          npm run build

      # Backend install (all microservices)
      - name: Install Backend Dependencies
        run: |
          cd app/services/user-service && npm install
          cd app/services/order-service && npm install
          cd app/services/payment-service && npm install

# --------------------------------------------------
# 2️⃣ GITLEAKS – SECRET SCAN
# --------------------------------------------------
  gitleaks:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    needs: compile

    steps:
      - uses: actions/checkout@v4
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2

# --------------------------------------------------
# 3️⃣ TRIVY – SECURITY SCAN
# --------------------------------------------------
  trivy:
    name: Vulnerability Scan (Trivy)
    runs-on: ubuntu-latest
    needs: compile

    steps:
      - uses: actions/checkout@v4
      - name: Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          severity: CRITICAL,HIGH
          exit-code: 1

# --------------------------------------------------
# 4️⃣ SONARQUBE – FRONTEND
# --------------------------------------------------
  sonar-frontend:
    name: SonarQube - Frontend
    runs-on: ubuntu-latest
    needs: [gitleaks, trivy]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Frontend Dependencies
        run: |
          cd app/frontend
          npm install

      - name: SonarQube Scan (Frontend)
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          projectBaseDir: frontend
          args: >
            -Dsonar.projectKey=frontend-service
            -Dsonar.projectName=Frontend_Service
            -Dsonar.sources=src
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/public/**
            -Dsonar.qualitygate.wait=true
# --------------------------------------------------
# 5️⃣ SONARQUBE – BACKEND MICROSERVICES (USING MATRIX)
# --------------------------------------------------
  sonar-backend:
    name: SonarQube - Backend Microservices
    runs-on: ubuntu-latest
    needs: [gitleaks, trivy]
    strategy:
      matrix:
        service: [user-service, order-service, payment-service]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Dependencies
        run: |
          cd app/services/${{ matrix.service }}
          npm install

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          projectBaseDir: app/services/${{ matrix.service }}
          args: >
            -Dsonar.projectKey=${{ matrix.service }}
            -Dsonar.projectName="${{ matrix.service }}"
            -Dsonar.sources=.
            -Dsonar.exclusions="**/node_modules/**,**/build/**"
            -Dsonar.qualitygate.wait=true





